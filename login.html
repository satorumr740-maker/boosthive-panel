{% extends "base.html" %}
{% block title %}Login | BoostHive{% endblock %}
{% block content %}
<main class="auth-wrap">
  <section class="auth-card">
      <div>
  <span class="eyebrow">Login</span>
  <h1>Power your social media growth.</h1>
</div>
    <form method="post" class="auth-form">
      <label>Username
        <input type="text" name="username" required>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      <button type="submit" class="btn btn-primary">Enter Panel</button>
    </form>
    <p class="muted">Need an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </section>
</main>
{% endblock %}
