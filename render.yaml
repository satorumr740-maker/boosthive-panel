services:
  - type: web
    name: boosthive-panel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: boosthive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: SMM_API_URL
        sync: false
      - key: SMM_API_KEY
        sync: false

databases:
  - name: boosthive-db
    plan: free
