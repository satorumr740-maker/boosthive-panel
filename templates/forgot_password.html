{% extends "base.html" %}
{% block title %}Forgot Password | BoostHive{% endblock %}
{% block content %}
<main class="auth-wrap">
  <section class="auth-card">
    <div>
      <span class="eyebrow">Forgot Password</span>
      <h1>Get a reset link on Gmail.</h1>
      <p class="muted">Enter your registered email. We will send a secure reset link.</p>
    </div>
    <form method="post" class="auth-form">
      <label>Registered Email (Gmail)
        <input type="email" name="email" required>
      </label>
      <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>
    <p class="muted"><a href="{{ url_for('login') }}">Back to login</a></p>
  </section>
</main>
{% endblock %}
